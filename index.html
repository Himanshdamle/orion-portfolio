    <div class="bg-gradient w-screen h-screen fixed top-0 left-0 -z-2"></div>

    <!-- st counter -->

      <div class="relative" id="st-animation-box">
        <div

        <div class="relative w-max overflow-hidden">
          <div class="jskdjf">
            <div class="relative t1">
              <h1 class="counter-txt">000%</h1>
              <h1 class="blur-[1px] absolute top-0 left-0 counter-txt">000%</h1>
            </div>

            <div class="absolute t2 blur-[5px] opacity-0">

              <h1 class="blur-[1px] absolute top-0 left-0 counter-txt">
                Himansh
              </h1>
            </div>
          </div>
        </div>
      </div>
    </section>

      style="opacity: 0; filter: blur(30px)"

      <main class="grid grid-rows-[1fr_auto]">
        <!-- Center -->
        <div class="flex flex-col justify-center">
          <div class="flex flex-col items-center">
            <!-- TOP -->
            <div class="flex flex-row items-end ml-16 -mb-2">
              <!-- web design -->

                    class="aspect-square w-5"

                </div>

              <h1 class="">Himansh</h1>
              <h1 class="blur-[1px] absolute top-0 left-0">Himansh</h1>

            <!-- Bottom -->
            <div class="flex flex-row items-start mr-10 -translate-x-5">
              <!-- Badminton -->
              <div class="flex flex-row -mr-10">

                <img
                  class="-rotate-180 aspect-square h-12"
                  src="/orion-portfolio/curve_arr.svg"
                  alt="curve_arr svg"
                />
              </div>

              <!-- web design -->
              <div class="flex flex-col">
                <img
                  class="aspect-square h-20"
                  src="/orion-portfolio/st_arr.svg"
                  alt="st_arr svg"
                />

                <div class="flex flex-row gap-1 text-[#8385FF] text-xl">
                  <img
                    class="aspect-square w-5"
                    src="/orion-portfolio/web_dev.svg"
                    alt="web_dev svg"
                  />
                  <h2 class="text-nowrap">Web Dev.</h2>
                </div>
              </div>
            </div>
          </div>

          <!-- Based in -->

            <div class="w-px h-16 -mt-1.5 ml-[-1.5px] bg-[#B9BBFF]"></div>
          </div>
        </div>
